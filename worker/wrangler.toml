name = "auto-repair-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace for content storage
[[kv_namespaces]]
binding = "CONTENT"
# Per-client: run `wrangler kv:namespace create CONTENT` and replace this ID
id = "" # Per-client: run `wrangler kv:namespace create CONTENT` and paste your ID here

# R2 bucket for image uploads
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "site-uploads"

[vars]
# Set via `wrangler secret put PASSWORD`
# PASSWORD = ""
